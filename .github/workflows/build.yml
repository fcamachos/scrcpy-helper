name: Compile with Nuitka and Release

on:
  push:
    tags:
      - 'v*' 

jobs:
  build-linux:
    name: Build for Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk patchelf
          pip install nuitka

      - name: Build with Nuitka (Linux)
        run: |
          python3 -m nuitka \
            --standalone \
            --onefile \
            --enable-plugin=tk-inter \
            --include-data-files=ico.png=ico.png \
            --include-data-dir=locales=locales \
            --linux-icon=ico.png \
            --remove-output \
            -o scrcpy-helper-linux \
            scrcpy_helper.py  

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: scrcpy-helper-linux
          retention-days: 1

  build-windows:
    name: Build for Windows
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install zstandard nuitka

      - name: Build with Nuitka (Windows)
        run: |
          python -m nuitka `
            --standalone `
            --onefile `
            --enable-plugin=tk-inter `
            --include-data-files=ico.png=ico.png `
            --include-data-dir=locales=locales `
            --windows-icon-from-ico=ico.ico `
            --windows-console-mode=disable `
            --assume-yes-for-downloads `
            --remove-output `
            -o scrcpy-helper-windows.exe `
            scrcpy_helper.py

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: scrcpy-helper-windows.exe
          retention-days: 1

  release:
    name: Create Release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate Checksums
        run: |
          cd artifacts
          sha256sum scrcpy-helper-linux > checksum-linux.txt
          sha256sum scrcpy-helper-windows.exe > checksum-windows.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/scrcpy-helper-linux
            artifacts/scrcpy-helper-windows.exe
            artifacts/checksum-linux.txt
            artifacts/checksum-windows.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}